<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fleettraxx</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --primary: #1A5FBD; --primary-h: #1450A3; --primary-xl: rgba(26,95,189,.08);
    --gold: #E8A000; --green: #0F9B58; --green-s: rgba(15,155,88,.12);
    --red: #D63031; --red-s: rgba(214,48,49,.1);
    --bg: #F4F7FB; --surface: #FFFFFF; --surface2: #F8FAFD;
    --text: #0D1B2A; --text2: #2D4059; --text3: #5A7A94; --muted: #8CA3BC;
    --border: #E2EAF4;
    --shadow-sm: 0 2px 8px rgba(13,27,42,.06);
    --shadow-md: 0 8px 28px rgba(13,27,42,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', system-ui, sans-serif; color: var(--text); overflow: hidden; }

  #loginView { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; box-shadow: var(--shadow-md); padding: 32px 28px;
  }
  .pin-logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-h));
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: var(--shadow-sm);
  }
  .pin-logo svg { width: 20px; height: 20px; }
  h1 { font-size: 19px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
  .sub { font-size: 12.5px; color: var(--text3); margin-bottom: 22px; line-height: 1.5; }
  label { display: block; font-size: 10.5px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; }
  input {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface2);
    outline: none; transition: border-color 0.15s ease;
  }
  input:focus { border-color: var(--primary); }
  .field { margin-bottom: 16px; }
  button {
    padding: 13px 18px; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
    background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(26,95,189,.24);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button:hover { background: var(--primary-h); }
  button:active { transform: scale(0.98); }
  button:disabled { background: var(--muted); box-shadow: none; cursor: default; }
  .full-btn { width: 100%; }
  .error {
    margin-top: 14px; background: var(--red-s); color: var(--red); border-radius: 10px;
    padding: 11px 13px; font-size: 12.5px; display: none; line-height: 1.5;
  }
  .error.show { display: block; }

  #appView { display: none; height: 100vh; flex-direction: column; }
  #appView.show { display: flex; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-icon {
    width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary), var(--primary-h));
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 15px; height: 15px; }
  .brand-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand-sub { font-size: 10.5px; color: var(--text3); }
  .signout-btn { background: var(--surface2); color: var(--text2); box-shadow: none; border: 1px solid var(--border); padding: 8px 13px; font-size: 12px; flex-shrink: 0; }
  .signout-btn:hover { background: var(--border); }

  .banner {
    background: var(--red-s); color: var(--red); padding: 10px 20px;
    font-size: 12.5px; line-height: 1.5; display: none; flex-shrink: 0;
  }
  .banner.show { display: block; }

  .layout { flex: 1; display: flex; min-height: 0; }

  .sidebar {
    width: 360px; min-width: 360px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-head h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
  .count-pill {
    font-family: 'DM Mono', monospace; font-size: 10.5px; font-weight: 600; color: var(--text3);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px;
  }
  .tracker-list { flex: 1; overflow-y: auto; padding: 10px; }

  .tracker-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .tracker-card:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
  .tracker-card.selected { border-color: var(--primary); background: var(--primary-xl); box-shadow: var(--shadow-sm); }
  .tracker-card.is-disabled { opacity: 0.5; cursor: default; }
  .tracker-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
  .tracker-name { font-size: 13.5px; font-weight: 700; }
  .badge {
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.04em;
    padding: 3px 7px; border-radius: 5px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
  }
  .badge.online { background: var(--green-s); color: var(--green); }
  .badge.offline { background: rgba(232,160,0,.12); color: var(--gold); }
  .badge.disabled { background: var(--red-s); color: var(--red); }
  .tracker-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-bottom: 6px; }
  .tracker-addr { font-size: 11.5px; color: var(--text2); line-height: 1.4; min-height: 15px; }
  .tracker-addr.loading { color: var(--muted); font-style: italic; }

  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(15,155,88,.45); } 70% { box-shadow: 0 0 0 6px rgba(15,155,88,0); } 100% { box-shadow: 0 0 0 0 rgba(15,155,88,0); } }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text3); font-size: 12.5px; line-height: 1.7; }

  .map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: var(--shadow-md) !important; font-family: 'DM Sans', sans-serif; }
  .popup-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .popup-row { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--text3); }
  .popup-addr { font-size: 11.5px; color: var(--text2); margin-top: 4px; line-height: 1.4; }

  .marker-pin {
    width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 8px rgba(13,27,42,.25); border: 2px solid white;
  }
  .marker-pin.online { background: var(--green); }
  .marker-pin.offline { background: var(--gold); }
  .marker-pin.disabled { background: var(--muted); }
  .marker-pin-dot { width: 8px; height: 8px; border-radius: 50%; background: white; transform: rotate(45deg); }



  .fleet-summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px 14px 0; }
  .summary-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 11px; }
  .summary-value { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1; }
  .summary-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-top: 5px; }
  .toolbar { padding: 10px 14px 12px; display: grid; grid-template-columns: 1fr 112px; gap: 8px; border-bottom: 1px solid var(--border); }
  .toolbar input, .toolbar select { height: 40px; padding: 0 12px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12.5px; outline: none; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--primary); }
  .mini-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .mini-chip { font-family: 'DM Mono', monospace; font-size: 9.5px; color: var(--text3); background: #fff; border: 1px solid var(--border); border-radius: 999px; padding: 3px 7px; }
  .map-actions { position: absolute; top: 14px; right: 14px; z-index: 500; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .map-action { background: var(--surface); color: var(--text2); box-shadow: var(--shadow-sm); border: 1px solid var(--border); padding: 9px 11px; font-size: 11.5px; }
  .detail-panel { position: absolute; left: 18px; bottom: 18px; z-index: 500; width: min(390px, calc(100% - 36px)); background: rgba(255,255,255,.96); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-md); padding: 16px; display: none; }
  .detail-panel.show { display: block; }
  .detail-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
  .detail-title { font-size: 15px; font-weight: 800; }
  .detail-sub { font-family: 'DM Mono', monospace; color: var(--text3); font-size: 10.5px; margin-top: 3px; }
  .detail-close { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); box-shadow: none; padding: 6px 9px; font-size: 11px; }
  .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .detail-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 9px; }
  .detail-stat b { display: block; font-family: 'DM Mono', monospace; font-size: 12px; }
  .detail-stat span { display: block; margin-top: 3px; font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
  .detail-address { color: var(--text2); font-size: 11.5px; line-height: 1.45; margin-bottom: 12px; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-link { text-decoration: none; background: var(--primary); color: #fff; border-radius: 10px; padding: 10px 12px; font-size: 12px; font-weight: 800; box-shadow: 0 4px 14px rgba(26,95,189,.20); }
  .detail-link.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); box-shadow: none; }
  .popup-actions { margin-top: 8px; display: flex; gap: 6px; }
  .popup-actions a { text-decoration: none; background: var(--primary); color: #fff; border-radius: 8px; padding: 6px 8px; font-size: 10px; font-weight: 700; }

  .history-tools { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: grid; gap: 8px; }
  .history-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .history-row input { flex: 1; min-width: 145px; padding: 9px 10px; font-size: 12px; }
  .history-btn { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); box-shadow: none; padding: 9px 10px; font-size: 11.5px; }
  .history-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 14px rgba(26,95,189,.18); }
  .history-status { font-size: 11.5px; color: var(--text3); line-height: 1.4; }
  .route-card { position: absolute; left: 18px; top: 18px; z-index: 501; width: min(360px, calc(100% - 36px)); background: rgba(255,255,255,.96); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-md); padding: 14px; display: none; }
  .route-card.show { display: block; }
  .route-title { font-size: 13px; font-weight: 800; margin-bottom: 4px; }
  .route-sub { font-size: 11px; color: var(--text3); line-height: 1.4; margin-bottom: 10px; }
  .route-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .route-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 8px; }
  .route-stat b { display: block; font-family: 'DM Mono', monospace; font-size: 11.5px; }
  .route-stat span { display: block; margin-top: 3px; font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }

  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; height: 49%; border-right: none; border-bottom: 1px solid var(--border); }
    .fleet-summary { grid-template-columns: repeat(4, 1fr); padding: 8px 10px 0; }
    .summary-card { padding: 8px; }
    .summary-value { font-size: 14px; }
    .summary-label { font-size: 8.5px; }
    .toolbar { padding: 8px 10px; }
    .map-actions { top: 10px; right: 10px; }
    .detail-panel { left: 10px; bottom: 10px; width: calc(100% - 20px); padding: 13px; max-height: 58vh; overflow-y: auto; }
    .route-card { left: 10px; top: 10px; width: calc(100% - 20px); }
    .map-wrap { flex: 1; min-height: 0; }
  }
</style>
</head>
<body>

<div id="loginView">
  <div class="card">
    <div class="pin-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C7.6 2 4 5.6 4 10c0 5.4 7 12 8 12s8-6.6 8-12c0-4.4-3.6-8-8-8Z" fill="white" fill-opacity="0.95"/>
        <circle cx="12" cy="10" r="3" fill="#1A5FBD"/>
      </svg>
    </div>
    <h1>Fleettraxx</h1>
    <div class="sub">Sign in to view your fleet's live locations.</div>
    <div class="field"><label for="email">Email</label><input type="email" id="email" autocomplete="username"></div>
    <div class="field"><label for="password">Password</label><input type="password" id="password" autocomplete="current-password"></div>
    <button id="loginBtn" class="full-btn">Sign In</button>
    <div class="error" id="errorBox"></div>
  </div>
</div>

<div id="appView">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C7.6 2 4 5.6 4 10c0 5.4 7 12 8 12s8-6.6 8-12c0-4.4-3.6-8-8-8Z" fill="white" fill-opacity="0.95"/>
          <circle cx="12" cy="10" r="3" fill="#1A5FBD"/>
        </svg>
      </div>
      <div style="min-width:0;">
        <div class="brand-name" id="companyName">Loading…</div>
        <div class="brand-sub" id="whoEmail"></div>
      </div>
    </div>
    <button class="signout-btn" id="signOutBtn">Sign Out</button>
  </div>

  <div class="banner" id="disabledBanner">Your company account is currently disabled. Contact your administrator.</div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-head"><h2>Your Fleet</h2><span class="count-pill" id="trackerCount">0</span></div>
      <div class="fleet-summary">
        <div class="summary-card"><div class="summary-value" id="statTotal">0</div><div class="summary-label">Total</div></div>
        <div class="summary-card"><div class="summary-value" id="statLive">0</div><div class="summary-label">Live</div></div>
        <div class="summary-card"><div class="summary-value" id="statOffline">0</div><div class="summary-label">Offline</div></div>
        <div class="summary-card"><div class="summary-value" id="statNoGps">0</div><div class="summary-label">No GPS</div></div>
      </div>
      <div class="toolbar">
        <input id="trackerSearch" type="search" placeholder="Search vehicle, reg or driver…">
        <select id="statusFilter" aria-label="Filter fleet">
          <option value="all">All</option>
          <option value="online">Live</option>
          <option value="offline">Offline</option>
          <option value="disabled">Disabled</option>
          <option value="nogps">No GPS</option>
        </select>
      </div>
      <div class="tracker-list" id="trackerList"></div>
    </div>
    <div class="map-wrap">
      <div class="map-actions">
        <button class="map-action" id="fitFleetBtn">Fit Fleet</button>
        <button class="map-action" id="toggleMapBtn">Satellite</button>
        <button class="map-action" id="exportCsvBtn">Export CSV</button>
      </div>
      <div class="detail-panel" id="detailPanel"></div>
      <div class="route-card" id="routeCard"></div>
      <div id="map"></div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDKdhVZRgcojnPPj0mSCsp6fDa6hs_knF0",
    authDomain: "fleettraxx.firebaseapp.com",
    projectId: "fleettraxx",
    storageBucket: "fleettraxx.firebasestorage.app",
    messagingSenderId: "114706231867",
    appId: "1:114706231867:web:aebef34f3351f43243221e"
  };
  firebase.initializeApp(firebaseConfig);
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const loginView = document.getElementById('loginView');
  const appView = document.getElementById('appView');
  const loginBtn = document.getElementById('loginBtn');
  const errorBox = document.getElementById('errorBox');

  function showError(msg) { errorBox.textContent = msg; errorBox.classList.add('show'); }
  function clearError() { errorBox.classList.remove('show'); }

  loginBtn.addEventListener('click', async () => {
    clearError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Enter both email and password.'); return; }
    loginBtn.disabled = true; loginBtn.textContent = 'Signing in…';
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
      showError('Sign in failed: ' + e.message);
      loginBtn.disabled = false; loginBtn.textContent = 'Sign In';
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', () => auth.signOut());

  // Google Maps-style tiles (same visual approach as Site Intelligence) — no API key required for these tile endpoints.
  const map = L.map('map', { zoomControl: false }).setView([54.5, -3.5], 6);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  const streetLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: '&copy; Google Maps'
  }).addTo(map);
  const satelliteLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
    maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: '&copy; Google Maps'
  });
  const trailLayer = L.layerGroup().addTo(map);
  const historyLayer = L.layerGroup().addTo(map);

  const markers = {};
  const trails = {};
  let hasFitOnce = false;
  let selectedTrackerId = null;
  let myCompanyId = null;
  let trackersUnsub = null;
  let lastTrackers = [];
  let filtered = [];
  let mapMode = 'street';
  const geocodeCache = {};

  function makeIcon(status) {
    return L.divIcon({
      className: '',
      html: '<div class="marker-pin ' + status + '"><div class="marker-pin-dot"></div></div>',
      iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
    });
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function toMillis(value) {
    if (!value) return null;
    if (typeof value === 'number') return value;
    if (value.toMillis) return value.toMillis();
    if (value.seconds) return value.seconds * 1000;
    const parsed = Date.parse(value);
    return Number.isNaN(parsed) ? null : parsed;
  }

  function vehicleReg(t) { return t.vrn || t.reg || t.registration || t.vehicleReg || ''; }
  function driverName(t) { return t.driverName || t.driver || t.assignedDriver || ''; }
  function fmtSpeed(v) { return v == null || v === '' ? '—' : Math.round(Number(v)) + ' mph'; }
  function fmtBattery(v) { return v == null || v === '' ? '—' : Math.round(Number(v)) + '%'; }
  function fmtAccuracy(v) { return v == null || v === '' ? '—' : Math.round(Number(v)) + 'm'; }
  function fmtIgnition(v) { return v === true ? 'On' : v === false ? 'Off' : '—'; }

  function todayId() { return new Date().toISOString().slice(0,10); }
  function formatTime(ms) { return ms ? new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—'; }
  function kmBetween(a, b) {
    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;
    const x = Math.sin(dLat/2) ** 2 + Math.sin(dLng/2) ** 2 * Math.cos(lat1) * Math.cos(lat2);
    return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  }
  function routeDistance(points) {
    let km = 0;
    for (let i = 1; i < points.length; i++) km += kmBetween(points[i-1], points[i]);
    return km;
  }
  function normaliseHistoryPoint(p) {
    if (!p) return null;
    const lat = Number(p.lat ?? p.latitude);
    const lng = Number(p.lng ?? p.longitude ?? p.lon);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
    return { lat, lng, timestamp: toMillis(p.timestamp || p.updatedAt || p.createdAt || p.time), speed: p.speed, accuracy: p.accuracy };
  }

  function timeAgo(ms) {
    ms = toMillis(ms);
    if (!ms) return 'never reported';
    const s = Math.max(0, Math.round((Date.now() - ms) / 1000));
    if (s < 60) return s + 's ago';
    const m = Math.round(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.round(m / 60);
    return h + 'h ago';
  }

  function statusOf(t) {
    if (!t.enabled) return 'disabled';
    const ms = toMillis(t.updatedAt);
    if (ms && (Date.now() - ms < 60000)) return 'online';
    return 'offline';
  }
  function statusLabel(status) { return status === 'online' ? 'Live' : status === 'offline' ? 'Offline' : 'Disabled'; }

  async function reverseGeocode(trackerId, lat, lng) {
    const cached = geocodeCache[trackerId];
    if (cached && Math.abs(cached.lat - lat) < 0.0008 && Math.abs(cached.lng - lng) < 0.0008) {
      return cached.address;
    }
    try {
      const res = await fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + lat + '&lon=' + lng + '&zoom=17');
      const data = await res.json();
      const address = data && data.display_name ? data.display_name : 'Address unavailable';
      geocodeCache[trackerId] = { lat, lng, address };
      return address;
    } catch (e) {
      return 'Address lookup failed';
    }
  }

  function flyToTracker(t) {
    if (t.lat == null || t.lng == null) return;
    selectedTrackerId = t.id;
    map.flyTo([t.lat, t.lng], 15, { duration: 0.6 });
    if (markers[t.id]) markers[t.id].openPopup();
    showDetail(t);
    renderList(filtered);
  }

  function updateStats(trackers) {
    const total = trackers.length;
    const live = trackers.filter(t => statusOf(t) === 'online').length;
    const disabled = trackers.filter(t => statusOf(t) === 'disabled').length;
    const noGps = trackers.filter(t => t.lat == null || t.lng == null).length;
    const offline = trackers.filter(t => statusOf(t) === 'offline').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statLive').textContent = live;
    document.getElementById('statOffline').textContent = offline;
    document.getElementById('statNoGps').textContent = noGps;
    document.getElementById('trackerCount').textContent = total + (disabled ? ' / ' + disabled + ' disabled' : '');
  }

  function applyFilters(trackers) {
    const q = document.getElementById('trackerSearch').value.trim().toLowerCase();
    const mode = document.getElementById('statusFilter').value;
    return trackers.filter(t => {
      const status = statusOf(t);
      const noGps = t.lat == null || t.lng == null;
      if (mode === 'nogps' && !noGps) return false;
      if (mode !== 'all' && mode !== 'nogps' && status !== mode) return false;
      if (!q) return true;
      return [t.name, vehicleReg(t), driverName(t), t.id].some(v => String(v || '').toLowerCase().includes(q));
    });
  }

  function showDetail(t) {
    const status = statusOf(t);
    const reg = vehicleReg(t) || 'No reg';
    const driver = driverName(t) || 'No driver assigned';
    const hasPos = t.lat != null && t.lng != null;
    const mapsUrl = hasPos ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(t.lat + ',' + t.lng) : '#';
    const panel = document.getElementById('detailPanel');
    panel.classList.add('show');
    panel.innerHTML =
      '<div class="detail-top"><div><div class="detail-title">' + escapeHtml(t.name || 'Unnamed tracker') + '</div>' +
      '<div class="detail-sub">' + escapeHtml(reg) + ' • ' + escapeHtml(driver) + '</div></div>' +
      '<button class="detail-close" id="closeDetailBtn">Close</button></div>' +
      '<div class="detail-grid">' +
      '<div class="detail-stat"><b>' + statusLabel(status) + '</b><span>Status</span></div>' +
      '<div class="detail-stat"><b>' + fmtSpeed(t.speed) + '</b><span>Speed</span></div>' +
      '<div class="detail-stat"><b>' + fmtBattery(t.battery) + '</b><span>Battery</span></div>' +
      '<div class="detail-stat"><b>' + fmtAccuracy(t.accuracy) + '</b><span>Accuracy</span></div>' +
      '<div class="detail-stat"><b>' + fmtIgnition(t.ignition) + '</b><span>Ignition</span></div>' +
      '<div class="detail-stat"><b>' + timeAgo(t.updatedAt) + '</b><span>Updated</span></div>' +
      '</div>' +
      '<div class="detail-address" id="detailAddress">' + (hasPos ? 'Locating address…' : 'No position reported yet.') + '</div>' +
      '<div class="detail-actions">' +
      (hasPos ? '<a class="detail-link" target="_blank" rel="noopener" href="' + mapsUrl + '">Open in Maps</a>' : '') +
      '<a class="detail-link secondary" href="#" id="copyLocationBtn">Copy location</a>' +
      '<a class="detail-link secondary" href="#" id="drawTrailBtn">Show live trail</a>' +
      '</div>' +
      '<div class="history-tools">' +
      '<div class="history-row"><input type="date" id="historyDate" value="' + todayId() + '"><button class="history-btn primary" id="loadHistoryBtn">Load route</button><button class="history-btn" id="clearHistoryBtn">Clear</button></div>' +
      '<div class="history-status" id="historyStatus">Load a date to view the route history for this tracker.</div>' +
      '</div>';
    document.getElementById('closeDetailBtn').onclick = () => panel.classList.remove('show');
    document.getElementById('copyLocationBtn').onclick = (e) => { e.preventDefault(); if (hasPos) navigator.clipboard.writeText(t.lat + ', ' + t.lng); };
    document.getElementById('drawTrailBtn').onclick = (e) => { e.preventDefault(); drawLiveTrail(t.id); };
    document.getElementById('loadHistoryBtn').onclick = (e) => { e.preventDefault(); loadHistoryRoute(t); };
    document.getElementById('clearHistoryBtn').onclick = (e) => { e.preventDefault(); clearHistoryRoute(); };
    if (hasPos) reverseGeocode(t.id, t.lat, t.lng).then(address => {
      const el = document.getElementById('detailAddress'); if (el) el.textContent = address;
    });
  }


  function clearHistoryRoute() {
    historyLayer.clearLayers();
    const card = document.getElementById('routeCard');
    card.classList.remove('show');
    card.innerHTML = '';
    const status = document.getElementById('historyStatus');
    if (status) status.textContent = 'Route cleared.';
  }

  async function loadHistoryRoute(t) {
    const status = document.getElementById('historyStatus');
    const dateInput = document.getElementById('historyDate');
    const dateId = dateInput && dateInput.value ? dateInput.value : todayId();
    if (status) status.textContent = 'Loading route for ' + dateId + '…';
    historyLayer.clearLayers();
    try {
      let points = [];

      // Preferred structure: trackers/{trackerId}/history/{YYYY-MM-DD}/points/{pointId}
      const pointSnap = await db.collection('trackers').doc(t.id).collection('history').doc(dateId).collection('points').orderBy('timestamp').limit(1500).get();
      pointSnap.forEach(doc => { const pt = normaliseHistoryPoint(doc.data()); if (pt) points.push(pt); });

      // Fallback structure: trackers/{trackerId}/history/{YYYY-MM-DD} with a points array
      if (points.length === 0) {
        const dayDoc = await db.collection('trackers').doc(t.id).collection('history').doc(dateId).get();
        if (dayDoc.exists) {
          const d = dayDoc.data();
          const arr = d.points || d.locations || d.route || [];
          if (Array.isArray(arr)) points = arr.map(normaliseHistoryPoint).filter(Boolean);
        }
      }

      points = points.filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lng));
      if (points.length < 2) {
        if (status) status.textContent = 'No route found for ' + dateId + '. This means no history was written for that date, or the phone/tracker did not have permission/background location running.';
        return;
      }

      const latLngs = points.map(p => [p.lat, p.lng]);
      L.polyline(latLngs, { weight: 5, opacity: 0.75 }).addTo(historyLayer);
      L.circleMarker(latLngs[0], { radius: 6, weight: 2, fillOpacity: 0.9 }).addTo(historyLayer).bindPopup('Start ' + formatTime(points[0].timestamp));
      L.circleMarker(latLngs[latLngs.length - 1], { radius: 6, weight: 2, fillOpacity: 0.9 }).addTo(historyLayer).bindPopup('End ' + formatTime(points[points.length - 1].timestamp));
      map.fitBounds(L.latLngBounds(latLngs), { padding: [55, 55] });

      const km = routeDistance(points);
      const movingSpeeds = points.map(p => Number(p.speed)).filter(v => Number.isFinite(v) && v > 0);
      const maxSpeed = movingSpeeds.length ? Math.max(...movingSpeeds) : null;
      const first = points[0].timestamp;
      const last = points[points.length - 1].timestamp;
      const hours = first && last ? Math.max(0, (last - first) / 3600000) : null;
      const card = document.getElementById('routeCard');
      card.classList.add('show');
      card.innerHTML =
        '<div class="route-title">' + escapeHtml(t.name || 'Tracker') + ' route</div>' +
        '<div class="route-sub">' + escapeHtml(dateId) + ' • ' + points.length + ' GPS points • ' + formatTime(first) + ' to ' + formatTime(last) + '</div>' +
        '<div class="route-grid">' +
        '<div class="route-stat"><b>' + km.toFixed(1) + ' km</b><span>Distance</span></div>' +
        '<div class="route-stat"><b>' + (hours == null ? '—' : hours.toFixed(1) + 'h') + '</b><span>Window</span></div>' +
        '<div class="route-stat"><b>' + (maxSpeed == null ? '—' : Math.round(maxSpeed) + ' mph') + '</b><span>Max speed</span></div>' +
        '</div>';
      if (status) status.textContent = 'Route loaded. Distance is an estimate based on GPS points.';
    } catch (e) {
      if (status) status.textContent = 'Could not load route: ' + e.message;
    }
  }

  function drawLiveTrail(trackerId) {
    trailLayer.clearLayers();
    const pts = trails[trackerId] || [];
    if (pts.length < 2) return;
    L.polyline(pts.map(p => [p.lat, p.lng]), { weight: 4, opacity: 0.7 }).addTo(trailLayer);
  }

  function renderList(trackers) {
    const listEl = document.getElementById('trackerList');
    document.getElementById('trackerCount').textContent = trackers.length;

    if (trackers.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No trackers have been assigned to your company yet.<br>Contact your administrator.</div>';
      return;
    }
    listEl.innerHTML = '';
    trackers.forEach(t => {
      const status = statusOf(t);
      const card = document.createElement('div');
      card.className = 'tracker-card' + (status === 'disabled' ? ' is-disabled' : '') + (selectedTrackerId === t.id ? ' selected' : '');

      const addrId = 'addr-' + t.id;
      let addrHtml = '<div class="tracker-addr loading" id="' + addrId + '">Locating address…</div>';
      if (t.lat == null || t.lng == null) {
        addrHtml = '<div class="tracker-addr" id="' + addrId + '">No position reported yet.</div>';
      }

      const reg = vehicleReg(t);
      const driver = driverName(t);
      card.innerHTML =
        '<div class="tracker-top"><div class="tracker-name">' + escapeHtml(t.name || 'Unnamed tracker') + '</div>' +
        '<span class="badge ' + status + '">' + statusLabel(status) + '</span></div>' +
        '<div class="tracker-meta">' + (status === 'online' ? '<span class="dot"></span>' : '') + timeAgo(t.updatedAt) + '</div>' +
        '<div class="mini-meta">' +
          (reg ? '<span class="mini-chip">' + escapeHtml(reg) + '</span>' : '') +
          (driver ? '<span class="mini-chip">' + escapeHtml(driver) + '</span>' : '') +
          '<span class="mini-chip">' + fmtSpeed(t.speed) + '</span>' +
          '<span class="mini-chip">Acc ' + fmtAccuracy(t.accuracy) + '</span>' +
        '</div>' + addrHtml;

      card.addEventListener('click', () => flyToTracker(t));
      listEl.appendChild(card);

      if (t.lat != null && t.lng != null) {
        reverseGeocode(t.id, t.lat, t.lng).then(address => {
          const el = document.getElementById(addrId);
          if (el) { el.textContent = address; el.classList.remove('loading'); }
        });
      }
    });
  }

  function renderMarkers(trackers) {
    const seen = new Set();
    trackers.forEach(t => {
      if (t.lat == null || t.lng == null) return;
      seen.add(t.id);
      const status = statusOf(t);
      if (!trails[t.id]) trails[t.id] = [];
      const last = trails[t.id][trails[t.id].length - 1];
      if (!last || Math.abs(last.lat - t.lat) > 0.00001 || Math.abs(last.lng - t.lng) > 0.00001) {
        trails[t.id].push({ lat: t.lat, lng: t.lng });
        if (trails[t.id].length > 80) trails[t.id].shift();
      }
      const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(t.lat + ',' + t.lng);
      const popupHtml =
        '<div class="popup-name">' + escapeHtml(t.name || 'Unnamed tracker') + '</div>' +
        '<div class="popup-row">' + t.lat.toFixed(6) + ', ' + t.lng.toFixed(6) + '</div>' +
        '<div class="popup-row">Updated ' + timeAgo(t.updatedAt) + '</div>' +
        '<div class="popup-row">Speed ' + fmtSpeed(t.speed) + ' • Accuracy ' + fmtAccuracy(t.accuracy) + '</div>' +
        '<div class="popup-addr" id="popup-addr-' + t.id + '">Locating address…</div>' +
        '<div class="popup-actions"><a target="_blank" rel="noopener" href="' + mapsUrl + '">Open Maps</a></div>';

      if (markers[t.id]) {
        markers[t.id].setLatLng([t.lat, t.lng]);
        markers[t.id].setIcon(makeIcon(status));
        markers[t.id].setPopupContent(popupHtml);
      } else {
        markers[t.id] = L.marker([t.lat, t.lng], { icon: makeIcon(status) }).addTo(map).bindPopup(popupHtml);
      }

      reverseGeocode(t.id, t.lat, t.lng).then(address => {
        const el = document.getElementById('popup-addr-' + t.id);
        if (el) el.textContent = address;
      });
    });
    Object.keys(markers).forEach(id => {
      if (!seen.has(id)) { map.removeLayer(markers[id]); delete markers[id]; }
    });

    if (!hasFitOnce) {
      const withPos = trackers.filter(t => t.lat != null && t.lng != null);
      if (withPos.length > 0) {
        hasFitOnce = true;
        if (withPos.length === 1) {
          map.setView([withPos[0].lat, withPos[0].lng], 15);
        } else {
          map.fitBounds(L.latLngBounds(withPos.map(t => [t.lat, t.lng])), { padding: [50, 50] });
        }
      }
    }
  }

  function renderAll(trackers) {
    lastTrackers = trackers;
    updateStats(trackers);
    filtered = applyFilters(trackers);
    renderList(filtered);
    renderMarkers(filtered);
    if (selectedTrackerId) {
      const selected = trackers.find(t => t.id === selectedTrackerId);
      if (selected) showDetail(selected);
    }
  }

  function watchCompanyTrackers() {
    if (trackersUnsub) trackersUnsub();
    trackersUnsub = db.collection('trackers').where('companyId', '==', myCompanyId).onSnapshot(
      snap => {
        const trackers = [];
        snap.forEach(doc => {
          const d = doc.data();
          trackers.push({
            id: doc.id,
            name: d.name || d.vehicleName || d.registration || doc.id,
            enabled: d.enabled !== false,
            lat: d.lat, lng: d.lng,
            accuracy: d.accuracy,
            updatedAt: toMillis(d.updatedAt),
            speed: d.speed, heading: d.heading, battery: d.battery, ignition: d.ignition,
            vrn: d.vrn, reg: d.reg, registration: d.registration, vehicleReg: d.vehicleReg,
            driverName: d.driverName, driver: d.driver, assignedDriver: d.assignedDriver
          });
        });
        renderAll(trackers);
      },
      err => {
        document.getElementById('trackerList').innerHTML = '<div class="empty-state">Could not load trackers: ' + err.message + '</div>';
      }
    );
  }

  document.getElementById('trackerSearch').addEventListener('input', () => renderAll(lastTrackers));
  document.getElementById('statusFilter').addEventListener('change', () => renderAll(lastTrackers));
  document.getElementById('fitFleetBtn').addEventListener('click', () => {
    const withPos = filtered.filter(t => t.lat != null && t.lng != null);
    if (withPos.length === 1) map.setView([withPos[0].lat, withPos[0].lng], 15);
    if (withPos.length > 1) map.fitBounds(L.latLngBounds(withPos.map(t => [t.lat, t.lng])), { padding: [50, 50] });
  });
  document.getElementById('toggleMapBtn').addEventListener('click', () => {
    if (mapMode === 'street') {
      map.removeLayer(streetLayer); satelliteLayer.addTo(map); mapMode = 'satellite'; document.getElementById('toggleMapBtn').textContent = 'Street';
    } else {
      map.removeLayer(satelliteLayer); streetLayer.addTo(map); mapMode = 'street'; document.getElementById('toggleMapBtn').textContent = 'Satellite';
    }
  });
  document.getElementById('exportCsvBtn').addEventListener('click', () => {
    const rows = [['Name','Registration','Driver','Status','Latitude','Longitude','Speed','Accuracy','Battery','Ignition','Updated']]
      .concat(filtered.map(t => [t.name, vehicleReg(t), driverName(t), statusOf(t), t.lat ?? '', t.lng ?? '', t.speed ?? '', t.accuracy ?? '', t.battery ?? '', fmtIgnition(t.ignition), toMillis(t.updatedAt) ? new Date(toMillis(t.updatedAt)).toISOString() : '']));
    const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'fleettraxx-live-fleet.csv'; a.click(); URL.revokeObjectURL(url);
  });

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists || userDoc.data().role !== 'company') {
          alert('This account is not set up as a company login. Signing out.');
          auth.signOut();
          return;
        }
        const userData = userDoc.data();
        myCompanyId = userData.companyId;

        loginView.style.display = 'none';
        appView.classList.add('show');
        setTimeout(() => map.invalidateSize(), 100);
        document.getElementById('whoEmail').textContent = user.email;

        const companyDoc = await db.collection('companies').doc(myCompanyId).get();
        const companyData = companyDoc.exists ? companyDoc.data() : null;
        document.getElementById('companyName').textContent = companyData ? companyData.name : 'Unknown company';

        const isDisabled = userData.active === false || (companyData && companyData.enabled === false);
        document.getElementById('disabledBanner').classList.toggle('show', isDisabled);

        if (!isDisabled) {
          watchCompanyTrackers();
        } else {
          document.getElementById('trackerList').innerHTML = '';
        }
      } catch (e) {
        showError('Could not load your account: ' + e.message);
        auth.signOut();
      }
    } else {
      if (trackersUnsub) { trackersUnsub(); trackersUnsub = null; }
      Object.keys(markers).forEach(id => { map.removeLayer(markers[id]); delete markers[id]; });
      trailLayer.clearLayers();
      historyLayer.clearLayers();
      lastTrackers = []; filtered = []; selectedTrackerId = null;
      document.getElementById('detailPanel').classList.remove('show');
      loginView.style.display = 'flex';
      appView.classList.remove('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  });
</script>
